<!DOCTYPE html>
<!-- 作成日時: 2026-04-12 / ver 1.0.0 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSummarizer v1.0.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2236;
    --border: #1e3a5f;
    --teal: #00c9b1;
    --teal2: #00a896;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --error: #f87171;
    --success: #34d399;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  /* ── ヘッダー ── */
  header {
    width: 100%;
    max-width: 860px;
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(22px, 4vw, 32px);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo span { color: var(--teal); }

  .badge {
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    padding-bottom: 2px;
  }

  /* ── 設定パネル ── */
  .config-panel {
    width: 100%;
    max-width: 860px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }

  .config-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 200px;
  }

  .config-group label {
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
  }

  .config-group input, .config-group select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-group input:focus, .config-group select:focus {
    border-color: var(--teal);
  }
  .config-group select option { background: var(--bg3); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.err { background: var(--error); }

  .status-label {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    padding-bottom: 10px;
  }

  /* ── メインエリア ── */
  .main {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .char-count {
    font-size: 11px;
    color: var(--text3);
    font-variant-numeric: tabular-nums;
  }

  textarea {
    flex: 1;
    min-height: 320px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.8;
    padding: 20px;
    resize: none;
    outline: none;
  }
  textarea::placeholder { color: var(--text3); }

  .panel-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text3);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--text3); color: var(--text2); }

  /* ── 出力パネル ── */
  .output-body {
    flex: 1;
    min-height: 320px;
    padding: 20px;
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
    overflow-y: auto;
    position: relative;
  }

  .output-placeholder {
    color: var(--text3);
    font-style: italic;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
    line-height: 2;
  }

  .output-placeholder .icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
    opacity: 0.3;
  }

  /* ストリーミングカーソル */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--teal);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── 送信ボタン ── */
  .submit-area {
    width: 100%;
    max-width: 860px;
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .mode-select {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 0 14px;
    height: 52px;
    outline: none;
    cursor: pointer;
    min-width: 160px;
  }
  .mode-select:focus { border-color: var(--teal); }
  .mode-select option { background: var(--bg2); }

  .btn-submit {
    flex: 1;
    height: 52px;
    background: linear-gradient(135deg, var(--teal), var(--blue));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-submit .loading-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: rgba(255,255,255,0.5);
    width: 0%;
    animation: none;
  }
  .btn-submit.loading .loading-bar {
    animation: progress 3s ease-in-out infinite;
  }
  @keyframes progress {
    0% { width: 0%; left: 0; }
    50% { width: 70%; left: 0; }
    100% { width: 0%; left: 100%; }
  }

  /* ── エラー表示 ── */
  .error-msg {
    width: 100%;
    max-width: 860px;
    margin-top: 16px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--error);
    display: none;
  }
  .error-msg.show { display: block; }

  /* ── セクション区切り（出力内） ── */
  .summary-section { margin-bottom: 16px; }
  .summary-section strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 6px;
  }

  .image-drop-area {
    border-top: 1px dashed var(--border);
    padding: 16px 20px;
    cursor: pointer;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    transition: background 0.2s;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.8;
  }
  .image-drop-area:hover { background: rgba(255,255,255,0.02); }

  .img-remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    color: #fff;
    width: 24px; height: 24px;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text3);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy:hover { border-color: var(--teal); color: var(--teal); }
  .btn-copy.copied { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Med<span>Sum</span></div>
    <div class="badge">Medical Document Summarizer</div>
  </div>
  <div class="status-label">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">未接続</span>
  </div>
</header>

<!-- 設定パネル -->
<div class="config-panel">
  <div class="config-group" style="flex:2; min-width:260px;">
    <label>エンドポイント</label>
    <input type="text" id="endpoint" value="http://192.168.11.27:11434/api/chat" placeholder="http://...">
  </div>
  <div class="config-group">
    <label>モデル</label>
    <input type="text" id="modelName" value="deepseek-r1-distill-qwen-7b-4bit" placeholder="model name">
  </div>
  <div>
    <button class="btn-clear" onclick="checkConnection()" style="height:40px; padding: 0 20px;">接続確認</button>
  </div>
</div>

<!-- 入力・出力 -->
<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">入力</span>
      <span class="char-count" id="charCount">0 文字</span>
    </div>
    <textarea id="inputText" placeholder="医学文書をここにペーストしてください。

退院サマリー、紹介状、検査報告書、ガイドライン抜粋など、どのような文書でも要約します。"></textarea>
    <div class="image-drop-area" id="imageDropArea" onclick="document.getElementById('imageInput').click()">
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      <div id="imagePreviewWrap" style="display:none; position:relative;">
        <img id="imagePreview" style="max-width:100%; max-height:160px; border-radius:8px; display:block; margin:0 auto;">
        <button class="img-remove-btn" onclick="removeImage(event)">✕</button>
      </div>
      <div id="imageDropLabel">
        <span style="font-size:24px; opacity:0.3;">🖼</span><br>
        <span>画像をタップして追加</span><br>
        <span style="font-size:11px; opacity:0.5;">検査結果・画像レポート・処方箋など</span>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-clear" onclick="clearInput()">クリア</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">要約</span>
      <button class="btn-copy" id="copyBtn" onclick="copyOutput()" style="display:none;">コピー</button>
    </div>
    <div class="output-body" id="outputBody">
      <div class="output-placeholder" id="placeholder">
        <span class="icon">⚕</span>
        左に文書をペーストして<br>要約モードを選び<br>実行してください
      </div>
    </div>
    <div class="panel-footer" id="outputFooter" style="display:none;">
      <span style="font-size:11px; color:var(--text3);" id="tokenInfo"></span>
    </div>
  </div>
</div>

<!-- 送信エリア -->
<div class="submit-area">
  <select class="mode-select" id="summaryMode">
    <option value="general">📋 一般要約</option>
    <option value="clinical">🏥 臨床要約</option>
    <option value="discharge">📄 退院サマリー</option>
    <option value="bullet">• 箇条書き</option>
    <option value="translate">🌐 英→日 翻訳要約</option>
  </select>
  <button class="btn-submit" id="submitBtn" onclick="submitSummary()">
    要約を実行
    <div class="loading-bar" id="loadingBar"></div>
  </button>
</div>

<div class="error-msg" id="errorMsg"></div>

<script>
// ── プロンプト定義 ──
const PROMPTS = {
  general: `あなたは優秀な医療文書アシスタントです。
以下の医学文書を日本語で簡潔に要約してください。
重要な情報（主訴、診断、治療方針、注意事項）を漏らさず、読みやすい形にまとめてください。`,

  clinical: `あなたは救急・総合内科専門の医師アシスタントです。
以下の医学文書を臨床的観点から要約してください。
【主訴・現病歴】【身体所見・検査結果】【診断】【治療・処置】【今後の方針】の構造で整理してください。`,

  discharge: `あなたは病院の医師事務補助スタッフです。
以下の文書から退院サマリーの形式で要約を作成してください。
入院期間、主病名、入院経過、退院時状態、退院後指示を明確に記載してください。`,

  bullet: `あなたは医療文書の要約専門家です。
以下の医学文書の要点を箇条書きで整理してください。
各項目は1〜2文で簡潔にまとめ、重要度の高い情報を先に記載してください。`,

  translate: `あなたは医学英語の翻訳・要約の専門家です。
以下の英語医学文書を日本語に翻訳しながら要約してください。
専門用語には適切な日本語訳を使用し、重要な数値や固有名詞は正確に記載してください。`
};

// ── 画像処理 ──
let currentImageBase64 = null;

function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  loadImage(file);
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    // base64部分のみ抽出
    currentImageBase64 = dataUrl.split(',')[1];
    document.getElementById('imagePreview').src = dataUrl;
    document.getElementById('imagePreviewWrap').style.display = 'block';
    document.getElementById('imageDropLabel').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function removeImage(e) {
  e.stopPropagation();
  currentImageBase64 = null;
  document.getElementById('imagePreview').src = '';
  document.getElementById('imagePreviewWrap').style.display = 'none';
  document.getElementById('imageDropLabel').style.display = 'block';
  document.getElementById('imageInput').value = '';
}

// ドラッグ&ドロップ対応
document.addEventListener('DOMContentLoaded', () => {
  const area = document.getElementById('imageDropArea');
  area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.background = 'rgba(0,201,177,0.05)'; });
  area.addEventListener('dragleave', () => { area.style.background = ''; });
  area.addEventListener('drop', (e) => {
    e.preventDefault();
    area.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });
});


async function checkConnection() {
  const endpoint = document.getElementById('endpoint').value.trim();
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusText');
  const model = document.getElementById('modelName').value.trim();

  label.textContent = '確認中...';
  dot.className = 'status-dot';

  try {
    // チャットエンドポイントに最小リクエストを投げて確認
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: [{ role: 'user', content: 'hi' }],
        stream: false
      }),
      signal: AbortSignal.timeout(8000)
    });
    if (res.ok) {
      dot.className = 'status-dot ok';
      label.textContent = '接続OK';
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    dot.className = 'status-dot err';
    label.textContent = `接続失敗: ${e.message}`;
  }
}

// ── 入力文字数カウント ──
document.getElementById('inputText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = `${this.value.length.toLocaleString()} 文字`;
});

// ── クリア ──
function clearInput() {
  document.getElementById('inputText').value = '';
  document.getElementById('charCount').textContent = '0 文字';
}

// ── コピー ──
function copyOutput() {
  const text = document.getElementById('outputBody').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ コピー済';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── 要約実行 ──
async function submitSummary() {
  const inputText = document.getElementById('inputText').value.trim();
  const endpoint = document.getElementById('endpoint').value.trim();
  const model = document.getElementById('modelName').value.trim();
  const mode = document.getElementById('summaryMode').value;

  if (!inputText && !currentImageBase64) {
    showError('文書をペーストするか画像を追加してください。');
    return;
  }
  if (!endpoint) {
    showError('エンドポイントを入力してください。');
    return;
  }

  const systemPrompt = PROMPTS[mode];
  const userMessage = {
    role: 'user',
    content: `以下の医学文書を要約してください：\n\n${inputText || '（画像を参照してください）'}`
  };
  if (currentImageBase64) {
    userMessage.images = [currentImageBase64];
  }

  // UI準備
  setLoading(true);
  clearError();
  clearOutputDisplay();

  const startTime = Date.now();

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: systemPrompt },
          userMessage
        ],
        stream: true
      })
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }

    // ストリーミング読み取り
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let evalCount = 0;

    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('copyBtn').style.display = 'none';

    const outputBody = document.getElementById('outputBody');
    outputBody.innerHTML = '';

    const textNode = document.createElement('div');
    textNode.style.whiteSpace = 'pre-wrap';
    textNode.style.lineHeight = '1.9';
    outputBody.appendChild(textNode);

    const cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    outputBody.appendChild(cursorEl);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.trim());

      for (const line of lines) {
        try {
          // SSE形式 "data: {...}" の場合
          const jsonStr = line.startsWith('data: ') ? line.slice(6) : line;
          if (jsonStr === '[DONE]') {
            cursorEl.remove();
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('tokenInfo').textContent = `${elapsed}s`;
            document.getElementById('outputFooter').style.display = 'flex';
            document.getElementById('copyBtn').style.display = 'inline-block';
            continue;
          }
          const json = JSON.parse(jsonStr);

          // Ollama形式
          if (json.message?.content) {
            fullText += json.message.content;
            // deepseek-r1のthinkタグを除去して表示
            const displayText = fullText.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
            textNode.textContent = displayText || fullText;
          }
          // OpenAI互換形式（ストリーム）
          if (json.choices?.[0]?.delta?.content) {
            fullText += json.choices[0].delta.content;
            textNode.textContent = fullText;
          }
          // OpenAI互換形式（非ストリーム）
          if (json.choices?.[0]?.message?.content) {
            fullText = json.choices[0].message.content;
            textNode.textContent = fullText;
          }

          if (json.eval_count) evalCount = json.eval_count;
          if (json.done || json.choices?.[0]?.finish_reason === 'stop') {
            cursorEl.remove();
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('tokenInfo').textContent =
              evalCount ? `${evalCount} tokens · ${elapsed}s` : `${elapsed}s`;
            document.getElementById('outputFooter').style.display = 'flex';
            document.getElementById('copyBtn').style.display = 'inline-block';
          }
        } catch (_) {}
      }
    }

  } catch (e) {
    showError(`エラー: ${e.message}\n\nエンドポイントとモデル名を確認し、ai.localのサーバーが起動していることを確認してください。`);
    resetOutputDisplay();
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('submitBtn');
  if (on) {
    btn.disabled = true;
    btn.innerHTML = '処理中...<div class="loading-bar" id="loadingBar"></div>';
    btn.classList.add('loading');
  } else {
    btn.disabled = false;
    btn.innerHTML = '要約を実行<div class="loading-bar" id="loadingBar"></div>';
    btn.classList.remove('loading');
  }
}

function clearOutputDisplay() {
  const ob = document.getElementById('outputBody');
  ob.innerHTML = '<div class="output-placeholder" id="placeholder" style="display:none;"></div>';
  document.getElementById('outputFooter').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
}

function resetOutputDisplay() {
  const ob = document.getElementById('outputBody');
  ob.innerHTML = `<div class="output-placeholder" id="placeholder">
    <span class="icon">⚕</span>
    左に文書をペーストして<br>要約モードを選び<br>実行してください
  </div>`;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function clearError() {
  document.getElementById('errorMsg').classList.remove('show');
}

// 起動時に接続確認
window.addEventListener('load', () => setTimeout(checkConnection, 500));
</script>
</body>
</html>
